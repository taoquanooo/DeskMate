name: Windows preview

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: windows-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: x86_64-pc-windows-msvc
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
      - name: Build unsigned NSIS preview
        run: pnpm tauri build --ci --config src-tauri/tauri.preview.conf.json --target x86_64-pc-windows-msvc --bundles nsis
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DeskMate-Windows-x64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
