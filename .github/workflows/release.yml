name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: x86_64-pc-windows-msvc
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: cargo test --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
      - id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DESKMATE_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
          DESKMATE_CATALOG_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/catalog/v1/catalog.json
          DESKMATE_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DeskMate ${{ github.ref_name }}
          releaseBody: |
            Windows 10/11 x64 NSIS 安装包。内置默认伙伴和 Lev-neon 两只宠物，离线可用。
            七只在线官方宠物通过 GitHub Pages 目录和 pets-v1 Release 按需下载。
            应用内更新产物使用 Tauri 项目密钥签名。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --target x86_64-pc-windows-msvc --bundles nsis
          releaseAssetNamePattern: DeskMate_[version]_x64[setup].[ext]
